name: MyWorkflow with jobs
on:
  push:
    paths:
      - 'src/**'
env:
  SPRING_PROFILE: dev

jobs:
  InitialJob1:
    runs-on: windows-latest
    steps:
      - run:  echo "job Triggered because a file inside src/ changed."

  Build2:
    needs: InitialJob1
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building App"

  Test3:
    needs: Build2
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing Application"

  Package4:
    needs: Test3
    runs-on: ubuntu-latest
    steps:
      - run: echo "packaging application";

  check-git5:
    runs-on: ubuntu-latest
    steps:
      - name: check git
        run: git --version

  checkout-clone-repo6:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

  installJava7:
    needs: checkout-clone-repo6
    runs-on: ubuntu-latest
    steps:
      - name: install java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
      - name: print java version
        run: java -version

      - name: maven version
        run: mvn -version

  compileproject8:
    needs: installJava7
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: actions/checkout@v4
      - run: mvn clean compile

  printEnv9:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Printing Env Variables spring profile - $SPRING_PROFILE"